defaults:
  - _self_
  - /strategy: gs
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

path: ???
seed_initialization: 42  # seed for rng in model initialization
experiment_name: ""
resume: ""
out_dir: "./runs"
n_iterations: 30000
with_gui: false
with_viser_gui: false
gui_update_from_device: true
val_frequency: 5000
num_workers: 24
use_wandb: false
wandb_project: "3dgrt"
wandb_run_id: ""
wandb_resume: "allow"
test_last: true
validate_first: false
validate_final: true
validate_only: false
log_frequency: 1
compute_extra_metrics: true

enable_frame_timings: false

enable_writer: true
writer:
  hit_stat_frequency: 999999
  max_num_hits: 128
  log_image_views: ${int_list:[ 0, 13, 27, 43, 78 ]}
  eval_image_count: 5
  eval_image_group_size: 5
  footprint_sample_count: 200000

export_ply:
  enabled: false
  path: ""
import_ply:
  enabled: false
  path: ""
  init_global_step: 0

surface_aligned_init:
  enabled: false
  use_confidence_gating: false
  n_neighbors: 12
  chunk_size: 200000
  tangent_scale_multiplier: 1.0
  normal_scale_multiplier: 0.25
  min_planarity: 0.25
  max_scattering: 0.15
  min_scale: 0.002
  max_scale: 0.05

micro_splat_init:
  enabled: false
  fraction: 0.10
  scale_multiplier: 0.25
  density_multiplier: 0.50
  jitter_multiplier: 0.0
  min_scale: 0.002

camera_residual:
  enabled: false
  lr: 0.0001
  reg_lambda: 1.0
  max_rotation_rad: 0.0174533
  max_translation_m: 0.02
  optimize_global: true
  optimize_per_camera: false
  fail_on_zero_grad: true
  fail_after_steps: 5
  min_abs_grad: 1.e-12
  finite_difference_audit:
    enabled: false
    max_views: 12
    rotation_step_rad: 0.001
    translation_step_m: 0.002
    exit_after: true

camera_intrinsics_audit:
  enabled: false
  camera_indices: [0, 2]
  max_views_per_camera: 8
  focal_delta_fraction: 0.002
  principal_delta_px: 2.0
  skew_delta_px: 0.5
  numerator_delta: 0.005
  denominator_delta: 0.005
  affine_delta: 0.001
  tangential_delta: 0.001
  exit_after: true
  
export_usd:
  enabled: false
  path: ""
  apply_normalizing_transform: true
  format: standard  # "nurec" for Omniverse USDVol internal format, "standard" for USDVol ParticleField3DGaussianSplat
  half_precision: false
  export_cameras: true
  export_background: true
  sorting_mode_hint: cameraDistance

model:
  density_activation: sigmoid
  scale_activation: exp
  default_density: 0.1
  default_scale_factor: 1.0
  optimize_density: true
  optimize_features_albedo: true
  optimize_features_specular: true
  optimize_position: true
  optimize_rotation: true
  optimize_scale: true
  bvh_update_frequency: 1
  progressive_training:
    feature_type: "sh" # one of [sh, mlp], currently only sh supported
    init_n_features: 0 # sh: initial sh deg | mlp: num of dims initially unmasked
    max_n_features: 3 # sh: maximum sh deg | mlp: total num of dims finally unmasked
    increase_frequency: 1000 # unmask more feature dimensions every N global steps
    increase_step: 1 # sh: how many degrees unmasked per step | mlp: how many dims unmasked per step

  background:
    name: background-color # one of [skip-background, background-color]
    color: black # one of [black, white, random] needs to be defined if name == background-color

  print_stats: true

checkpoint:
  iterations: ${int_list:[ 7000, 30000 ]}

optimizer:
  type: adam # We only support adam and selective_adam for now
  lr: 0.0
  eps: 1.e-15
  params:
    positions:
      lr: 0.00016 # 3DGS value: 0.00016 initial and decayed to 0.0000016
    density:
      lr: 0.05 # 3DGS value: 0.05
    features_albedo:
      lr: 0.0025 # 3DGS value: 0.0025
    features_specular:
      lr: ${div:${optimizer.params.features_albedo.lr},20} # 3DGS value 20x smaller than lr of features_albedo
    rotation:
      lr: 0.001 # 3DGS value: 0.001
    scale:
      lr: 0.005 # 3DGS value: 0.005

scheduler:
  positions:
    # In the 3DGS paper they additionally have a parameter lr_delay_mult, but is is not being used so I drop it here
    type: exp
    lr_init: ${optimizer.params.positions.lr}
    lr_final: 0.0000016

    max_steps: 30000

  density:
    type: skip

loss:
  use_l1: true
  lambda_l1: 0.8
  
  use_l2: false
  lambda_l2: 1.0

  use_ssim: true
  lambda_ssim: 0.2

  use_opacity: false
  lambda_opacity: 0.0

  use_scale: false
  lambda_scale: 0.0

  use_sky_opacity: false
  lambda_sky_opacity: 0.0

  use_foundation_feature: false
  lambda_foundation_feature: 0.0

  # Dense depth supervision (Phase 3c: DA3 z-extended).
  # Stem-keyed [H, W] float32 metric depth .npy files in `dense_depth_dir`,
  # one per image (e.g. `left_0009.npy`). Pixels with `gt > 0` contribute
  # to a masked L1 against `outputs["pred_dist"]`.
  use_dense_depth: false
  lambda_dense_depth: 0.0
  dense_depth_dir: ""

  # Equirect consistency loss (Phase 3b: RoMa fisheye→equirect warps).
  # Warp + overlap `.npz` files keyed by image stem (e.g. `left_0009.npz`)
  # in `equirect_warp_dir` plus an equirect-stitched RGB per frame
  # (`{frame:04d}.png` in `equirect_image_dir`). Pixels with
  # `overlap >= equirect_consistency_overlap_threshold` contribute a
  # masked L1 between the rendered fisheye and the equirect color
  # sampled into fisheye coords via `F.grid_sample`.
  use_equirect_consistency: false
  lambda_equirect_consistency: 0.0
  equirect_warp_dir: ""
  equirect_image_dir: ""
  equirect_consistency_overlap_threshold: 0.5

foundation_features:
  enabled: false
  method: "dinov2_vitl14"
  repo_dir: ""
  weights: ""
  image_size: 224
  eval_on_logged_views_only: false
  log_error_tile: true

# Post-processing configuration
post_processing:
  method: null # Possible values: null, "ppisp", "luminance_affine"
  # Enable the controller for predicting per-frame corrections for novel views.
  # When false, zero corrections are used for novel views.
  use_controller: true
  # Number of extra distillation steps after main training (only for "ppisp").
  # When > 0, enables distillation mode: Gaussians and PPISP params are frozen,
  # only the controller is trained for these additional steps.
  n_distillation_steps: 5000
  # Luminance affine parameters. The first B2G experiment uses camera-only
  # correction; frame residuals are optional and strongly regularized.
  lr: 0.001
  reg_lambda: 0.01
  use_frame_residual: false
  max_log_gain: 0.25
  max_bias: 0.10
  use_residual_grid: false
  residual_grid_size: 32
  residual_grid_max: 0.05
  residual_grid_reg_lambda: 0.01

hydra:
  output_subdir: null
  job:
    chdir: false
  run:
    dir: .
