defaults:
- _self_
- /strategy: gs
- override hydra/hydra_logging: disabled
- override hydra/job_logging: disabled

path: ???
seed_initialization: 42  # seed for rng in model initialization
experiment_name: ""
resume: ""
out_dir: "./runs"
n_iterations: 30000
with_gui: false
with_viser_gui: false
gui_update_from_device: true
val_frequency: 5000
num_workers: 24
use_wandb: false
wandb_project: "3dgrt"
test_last: true
validate_first: false
log_frequency: 1
compute_extra_metrics: true

enable_frame_timings: false

enable_writer: true
writer:
  hit_stat_frequency: 999999
  max_num_hits: 128
  log_image_views: ${int_list:[ 0, 13, 27, 43, 78 ]}

  eval_image_count: 5
  eval_image_group_size: 5
  footprint_sample_count: 200000
export_ply:
  enabled: false
  path: ""
import_ply:
  enabled: false
  path: ""
  init_global_step: 0

export_usd:
  enabled: false
  path: ""
  apply_normalizing_transform: true
  format: standard  # "nurec" for internal USDVol format, "standard" for USDVol ParticleField3DGaussianSplat
  half_precision: false
  export_cameras: true
  export_background: true
  # zDepth | cameraDistance | rayHitDistance
  sorting_mode_hint: cameraDistance
  # Enable post-processing export when the checkpoint contains a supported module.
  # Defaults to true; ppisp-integration-mode controls how PPISP is exported.
  export_post_processing: true
  # spg-runtime authors PPISP as Omniverse SPG shaders applied at render time.
  # sh-optimized folds one fixed PPISP transform into Gaussian SH coefficients.
  # spg-runtime | sh-optimized
  ppisp-integration-mode: spg-runtime
  # Optional fixed PPISP camera/frame. sh-optimized defaults unset values to 0;
  # spg-runtime keeps dynamic per-camera/per-frame behavior when unset.
  ppisp-reference-camera-id:
  ppisp-reference-frame-id:
  # Achromatic PPISP responsivity default authored on spg-runtime SPG shaders.
  # To rescale asset radiance by k while preserving the PPISP input magnitude,
  # set scene-radiance-scale: k and ppisp-responsivity: 1/k.
  ppisp-responsivity: 1.0
  # null = auto-export controllers when the PPISP checkpoint has them.
  # true = require controller export; false = force static/time-sampled fallback.
  enable-ppisp-controller-export:
  # Number of optimizer steps for sh-optimized export. null uses the default (3000).
  sh-optimization-num-iterations:
  # Multiplicative scale applied to exported SH radiance.
  scene-radiance-scale: 1.0
  # USD timeCodesPerSecond; time codes are bare frame indices so this sets playback speed
  frames_per_second: 1.0

model:
  representation: gaussian_mixture
  density_activation: sigmoid
  scale_activation: exp
  default_density: 0.1
  default_scale_factor: 1.0
  optimize_density: true
  optimize_features_albedo: true
  optimize_features_specular: true
  optimize_features: true
  optimize_position: true
  optimize_rotation: true
  optimize_scale: true
  bvh_update_frequency: 1
  feature_type: "sh" # one of [sh, nht] # sh: spherical harmonics radiance, nht: neural harmonics texture
  # Positional carrier residuals (sh mode only; 3dgut renderer only).
  use_gabor_carrier: false
  gabor_num_terms: 3
  gabor_max_frequency: 4.0
  use_hermite_carrier: false
  use_siren_carrier: false
  siren_hidden_dim: 6
  siren_omega: 30.0
  siren_local_uv_scale: 3.0
  siren_init_seed: 20260626
  siren_init_scale: 0.2
  siren_output_init_scale: 0.0
  # Held-out-predictive B2G appearance state. Each Gaussian owns two bounded
  # RGB response directions; each physical camera owns two global temporal
  # coefficient splines. Zero temporal knots preserve the input checkpoint
  # exactly. This continuation representation requires fixed topology and an
  # explicit bake before static export.
  acquisition_appearance:
    enabled: false
    rank: 2
    num_cameras: 3
    num_knots: 32
    min_sequence_idx: 7
    max_sequence_idx: 278
    max_rgb_delta: 0.25
    magnitude_regularization: 0.01
    curvature_regularization: 0.05
    freeze_base_gaussians: true
  # Held-out-predictive B2G fragment ownership. Each Gaussian owns four
  # bounded opacity-logit responses; each physical camera owns four smooth
  # temporal coefficient splines. Zero spatial responses preserve the input
  # checkpoint exactly even though the temporal bases break factorization
  # symmetry. This correction requires sigmoid density activation.
  acquisition_visibility:
    enabled: false
    rank: 4
    num_cameras: 3
    num_knots: 32
    min_sequence_idx: 7
    max_sequence_idx: 278
    max_logit_delta: 4.0
    response_sparsity_regularization: 0.001
    magnitude_regularization: 0.01
    curvature_regularization: 0.05
    freeze_base_gaussians: true
  # Faithful surface-local realization of the source-validated acquisition
  # model. Each Gaussian and physical camera own independent rank-two
  # coefficient knots. Held-out acquisition states interpolate only their
  # registered lower and upper knots.
  surface_acquisition_spline:
    enabled: false
    rank: 2
    num_cameras: 3
    num_knots: 32
    min_sequence_idx: 7
    max_sequence_idx: 278
    max_rgb_delta: 0.25
    magnitude_regularization: 0.01
    curvature_regularization: 0.05
    freeze_base_gaussians: true
  # Source-cross-validated B2G appearance state shared by persistent
  # native-LiDAR region-cells. Track zero is an immutable abstention state.
  # The track map is stored in checkpoints and must match the fixed topology.
  gaussian_track_acquisition:
    enabled: false
    track_ids_path: ""
    track_ids_sha256: ""
    num_cameras: 3
    num_knots: 32
    min_sequence_idx: 7
    max_sequence_idx: 278
    max_rgb_delta: 0.15
    magnitude_regularization: 0.01
    curvature_regularization: 0.10
    freeze_parent: true
  progressive_training:
    init_n_features: 0 # sh: initial sh deg | mlp: num of dims initially unmasked
    max_n_features: 3 # sh: maximum sh deg | mlp: total num of dims finally unmasked
    increase_frequency: 1000 # unmask more feature dimensions every N global steps
    increase_step: 1 # sh: how many degrees unmasked per step | mlp: how many dims unmasked per step

    feature_type: "sh"
  nht_features:
    dim: 48
    init_min: -1.5707963267948966
    init_max: 1.5707963267948966
    activation:
      type: "sincos"
      num_frequencies: 1
    interpolation_type: "barycentric"

  nht_decoder:
    enabled: true
    hidden_dim: 128
    num_layers: 3
    dir_encoding: "SphericalHarmonics"
    dir_encoding_degree: 3
    sh_scale: 3.0
    center_ray_encoding: false
    output_activation: "Sigmoid"
    unpremultiply_alpha: false
    learning_rate: 0.00068
    reg_weight: 0.0
    scheduler:
      type: "cosine"
      decay_final: 0.1
      max_steps: 30000
    ema_decay: 0.95
    ema_start_step: 0
    color_refine_steps: 3000

  background:
    name: background-color # one of [skip-background, background-color]
    color: black # one of [black, white, random] needs to be defined if name == background-color

  anchor_field:
    source_manifest_path: ""
    fold_contract_sha256: ""
    voxel_size_m: 0.15
    offsets_per_anchor: 4
    feature_dim: 32
    hidden_dim: 64
    max_offset_fraction: 0.5
    initial_scale_fraction: 0.15
    min_scale_fraction: 0.02
    max_scale_fraction: 0.35
    coverage_scale_fraction: 0.45
    coverage_max_scale_fraction: 0.75
    coverage_initial_density: 0.03
    coverage_max_density: 0.12
    detail_initial_density: 0.10
    # Exact transfer of the supported B2G view-local structural treatment.
    # The gate is opt-in and applies only to residual surface anchors.
    use_view_local_residual_gate: false
    view_local_clearance_radius_m: 1.0
    # Source DC can remain fixed or receive a bounded, view-independent delta.
    dc_mode: frozen_source
    dc_delta_max_sh: 1.77245385
    dc_lr: 0.0025
    # One isotropic coverage child plus three thin surface detail children is
    # the controlled hybrid treatment. all_surface reproduces the earlier
    # all-child thinning arm; free leaves every child unconstrained.
    covariance_mode: free
    optimization_mode: full
    normal_scale_fraction: 0.02
    feature_lr: 0.0025
    geometry_lr: 0.001
    appearance_lr: 0.0025

  print_stats: true

checkpoint:
  iterations: ${int_list:[ 7000, 30000 ]}

  keep_step_checkpoints: true
  save_last_on_validation: false
  save_best_on_validation: false
optimizer:
  type: adam # adam, selective_adam, or visibility_decayed_adam
  lr: 0.0
  betas: [0.9, 0.999]
  eps: 1.e-15
  resume_lr_scale: 1.0
  scale_position_lr_by_scene_extent: true
  params:
    positions:
      lr: 0.00016 # 3DGS value: 0.00016 initial and decayed to 0.0000016
    density:
      lr: 0.05 # 3DGS value: 0.05
    features_albedo:
      lr: 0.0025 # 3DGS value: 0.0025
    features_specular:
      lr: ${div:${optimizer.params.features_albedo.lr},20} # 3DGS value 20x smaller than lr of features_albedo
    features:
      lr: 0.015
    acquisition_appearance:
      lr: 0.0025
    acquisition_visibility:
      lr: 0.0025
    surface_acquisition_spline:
      lr: 0.0025
    gaussian_track_acquisition:
      lr: 0.0025
    rotation:
      lr: 0.001 # 3DGS value: 0.001
    scale:
      lr: 0.005 # 3DGS value: 0.005

scheduler:
  positions:
    # In the 3DGS paper they additionally have a parameter lr_delay_mult, but is is not being used so I drop it here
    type: exp
    lr_init: ${optimizer.params.positions.lr}
    lr_final: 0.0000016

    max_steps: 30000

  density:
    type: skip

  features:
    type: cosine
    decay_final: 0.1
    max_steps: 30000

loss:
  use_l1: true
  lambda_l1: 0.8

  use_l2: false
  lambda_l2: 1.0

  use_ssim: true
  lambda_ssim: 0.2

  use_camera_loss_weights: false
  camera_loss_weights: []
  # Per-image loss weights: JSON mapping image basename -> weight,
  # multiplied into the training loss alongside camera_loss_weights.
  # Eval/validation metrics are never weighted.
  use_image_loss_weights: false
  image_loss_weights_path: ""

  use_opacity: false
  lambda_opacity: 0.0

  use_scale: false
  lambda_scale: 0.0

  # Metric-depth supervision from COLMAP-aligned sidecars (anchors sparse
  # geometry to cure floater/leakage in weakly-constrained regions).
  use_depth: false
  lambda_depth: 0.0
  depth_loss_type: log_l1
  depth_apply_rgb_mask: true
  depth_min_m: 0.05
  # The tracer returns a premultiplied first depth moment. Opt in to the
  # conditional hit estimate E[t | hit] = pred_dist / pred_opacity.
  depth_normalize_by_opacity: false
  depth_opacity_floor: 0.0001
  # Moravec-Elfes range evidence: empty before the measured endpoint and
  # occupied at the endpoint. The free-space term is a first-moment surrogate,
  # not exact prefix transmittance.
  use_depth_free_space: false
  lambda_depth_free_space: 0.0
  depth_free_space_absolute_margin_m: 0.05
  depth_free_space_relative_margin: 0.02
  use_depth_occupancy: false
  lambda_depth_occupancy: 0.0
  # Optional second forward/backward pass for sparse measured depth. The
  # image pass remains ordinary Adam and excludes depth; this pass owns
  # independent row-sparse moments for position, opacity, rotation, and scale.
  # It must begin after every topology or density mutation has ended.
  geometry_only_pass:
    enabled: false
    start_iteration: 15001
    frequency: 1
    learning_rate_scale: 1.0
    # Optional authenticated train-only native range rays. When configured,
    # the independent pass traces scanner-relative rays from a representative
    # camera frame instead of projected camera-depth endpoints.
    native_ray_evidence_folder: ""
    native_ray_evidence_manifest_sha256: ""
    native_ray_sample_count: 16384
    native_ray_seed: 20260718
    # SplatRaster first projects particles into image tiles. Native bearings
    # therefore occupy their true full-sphere pixels instead of an unordered
    # 1xN list whose pinhole culling would silently omit measured endpoints.
    native_ray_equirect_width: 256
    native_ray_equirect_height: 128
    use_native_ray_interval_transmittance: false
    lambda_native_ray_free_prefix: 0.05
    lambda_native_ray_return_window: 0.005
    native_ray_interval_probability_floor: 1.0e-6

  # rim-gated geometric prior (persistent ray-distance constraint at theta>rim)
  use_rim_depth: false
  lambda_rim: 0.0
  rim_theta_min_deg: 60.0
  rim_centre_band_deg: 40.0
  rim_centre_anchor: true
  rim_detach_affine: false  # diagnostic: detach the centre-anchor fit so the loss cannot co-adapt the eval calibration (isolates the metric artifact)

  # high-frequency appearance loss on the clean fisheye rim band
  use_rim_hf: false
  lambda_rim_hf: 0.0
  rim_hf_theta_min_deg: 60.0
  rim_hf_theta_max_deg: 80.0
  rim_hf_kernel_size: 7
  rim_hf_sigma: 1.5
  rim_hf_loss_type: charbonnier
  rim_hf_charbonnier_epsilon: 0.01

  # MV-DINO multi-view-consistent feature rim loss.
  use_mvdino_rim: false
  lambda_mvdino_rim: 0.0
  mvdino_model_name: dinov2_reg
  mvdino_rim_theta_min_deg: 60.0
  mvdino_rim_theta_max_deg: 80.0
  mvdino_exp_dir:
  mvdino_warmup_iters: 3000
  mvdino_use_rim_crops: false
  mvdino_n_crops: 8
  mvdino_crop_px: 518
  mvdino_use_anyup: false
  mvdino_anyup_res: 512

# Post-processing configuration
  l1_loss_type: absolute
  charbonnier_epsilon: 0.01
  erp_latitude_weighting: false
  use_sky_opacity: false
  lambda_sky_opacity: 0.0
post_processing:
  method:      # Possible values: null, "ppisp", "luminance_affine"
  # Preserve a restored post-processing module as a differentiable, fixed
  # novel-view transform while another representation branch is trained.
  # No per-frame latent is consulted and no post-processing optimizer exists.
  frozen_inference_during_training: false
  # Mapping used only by post-processing modules. Rendering still uses
  # dataset intrinsics. Use "single_physical_camera" for monocular video
  # COLMAP bundles whose frame-specific intrinsics create many camera_id rows.
  camera_index_mode: dataset
  # Optional launch-contract guard for recipes with a known physical rig.
  expected_num_cameras:
  # Optional ordered physical-camera names for a sealed rig contract.
  expected_camera_names:
  resume_lr_scale: 1.0
  # Enable the controller for predicting per-frame corrections for novel views.
  # When false, zero corrections are used for novel views.
  use_controller: true
  # Number of extra distillation steps after main training (only for "ppisp").
  # When > 0, enables distillation mode: Gaussians and PPISP params are frozen,
  # only the controller is trained for these additional steps.
  n_distillation_steps: 5000
  # Opt-in held-out-predictive local affine controller. It consumes rendered
  # RGB and physical-camera identity, has no per-frame lookup, and is active
  # only with the PPISP controller during frozen-geometry distillation.
  use_multiscale_controller: false
  # Add render ray distance, opacity, and train-normalized camera pose.
  # This requires GLOBAL shutter, camera-space rays, and no camera residual.
  multiscale_use_view_context: false
  multiscale_coarse_grid_size: 4
  multiscale_fine_grid_size: 16
  multiscale_coarse_max_log_gain: 0.04
  multiscale_coarse_max_bias: 0.02
  multiscale_fine_max_log_gain: 0.02
  multiscale_fine_max_bias: 0.01
  multiscale_magnitude_regularization: 0.01
  multiscale_total_variation_regularization: 0.01
  multiscale_init_seed: 20260717
  # Luminance affine parameters. Camera-only correction is the default;
  # frame residuals are optional and strongly regularized.
  lr: 0.001
  reg_lambda: 0.01
  use_frame_residual: false
  max_log_gain: 0.25
  max_bias: 0.10
  use_color_matrix: false
  max_matrix_delta: 0.10
  color_matrix_reg_lambda: 0.25
  use_radial_affine: false
  radial_band_count: 4
  radial_max_log_gain: 0.08
  radial_max_bias: 0.03
  radial_reg_lambda: 0.50
  use_residual_grid: false
  residual_grid_size: 32
  residual_grid_max: 0.05
  residual_grid_reg_lambda: 0.01
  use_residual_grid_edge_gate: false
  residual_grid_gate_floor: 0.20
  use_temporal_affine: false
  temporal_num_knots: 32
  temporal_max_sequence_idx: 400
  temporal_max_log_gain: 0.08
  temporal_max_bias: 0.03
  temporal_reg_lambda: 0.50

hydra:
  output_subdir:
  job:
    chdir: false
  run:
    dir: .

camera_residual:
  enabled: false
  lr: 0.0001
  lr_end_fraction: 0.01
  warmup_steps: 0
  reg_lambda: 1.0
  max_rotation_rad: 0.0174533
  max_translation_m: 0.02
  max_rolling_rotation_rad: 0.004
  max_rolling_translation_m: 0.005
  optimize_global: true
  optimize_per_camera: false
  optimize_per_image: false
  optimize_rolling_per_camera: false
  freeze_gaussians: false
  fail_on_zero_grad: true
  fail_after_steps: 5
  min_abs_grad: 1.e-12
  finite_difference_audit:
    enabled: false
    max_views: 12
    rotation_step_rad: 0.001
    translation_step_m: 0.002
    per_view: false
    target_image_names: ""
    exit_after: true
viser_port: 8080
wandb_group: ""
wandb_run_id: ""
wandb_resume: "allow"
validate_final: true
validate_only: false
diagnostics:
  parquet_enabled: true     # Write per-step metrics to {output_dir}/diagnostics.parquet
  parquet_flush_steps: 100  # Flush row groups every N steps
  snapshot_frequency: 500   # Save render/residual/grad_positions PNGs every N steps (0 disables)
  snapshot_camera_index: 0  # Which train camera to render snapshots from
  snapshot_resolution: 256  # Thumbnail edge length
  snapshot_include_gt: true  # Include GT RGB when the train batch exposes it
  snapshot_contact_sheet_enabled: true  # Log GT/render/residual/grad in one PNG
  snapshot_grad_enabled: false  # Grad panels are sparse; opt in when needed
  snapshot_grad_attr: density  # Grad panel attr: positions/rotation/scale/density/features_albedo/features_specular
  snapshot_grad_scale_mode: p95  # Grad panel scale: p95/p99/log/linear
  validation_metrics_enabled: true  # Compute full validation diagnostics beyond PSNR/loss.
  training_metrics_enabled: true  # Compute comparable train-split diagnostics at validation checkpoints.
  training_metrics_max_views: 64  # Cap train-split eval views; 0 evaluates every train view.
  loss_volume_after_training: false  # Voxelize per-pixel error in 3D after training
  loss_volume_voxel_size_m: 0.1
  loss_volume_view_stride: 4
  loss_volume_pixel_stride: 8
early_stopping:
  enabled: false
  metric: masked_psnr_if_available
  patience: 3
  min_delta: 0.0
  min_step: 0
  min_score: 0.0
  min_score_after_step: 0
  restore_best_on_end: true

camera_intrinsics_audit:
  enabled: false
  camera_indices: [0, 2]
  max_views_per_camera: 8
  focal_delta_fraction: 0.002
  principal_delta_px: 2.0
  skew_delta_px: 0.5
  numerator_delta: 0.005
  denominator_delta: 0.005
  affine_delta: 0.001
  tangential_delta: 0.001
  exit_after: true

