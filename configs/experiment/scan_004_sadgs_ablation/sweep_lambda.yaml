# @package _global_
#
# Hydra-Optuna sweep skeleton for lambda_shape_aligned hyperparameter.
#
# Scope: UMich SAD-GS port — DEFERRED until depth-supervision hypothesis
# is re-justified on a different testbed. See SADGS_UMICH_PORT_PLAN.md.
#
# Invoked (when ready):
#   python train.py -m \
#       --config-name=experiment/scan_004_sadgs_ablation/sweep_lambda
#
# Requires hydra-optuna-sweeper plugin:
#   uv add hydra-optuna-sweeper
#
# Reference: https://hydra.cc/docs/plugins/optuna_sweeper/

defaults:
  - base
  - override hydra/sweeper: optuna
  - _self_

experiment_name: sweep_lambda_shape_aligned

# Placeholder UMich SAD-GS overrides — these will only fire once the
# UMich port lands. For now, this YAML is a structural template.
loss:
  use_shape_aligned_depth: true
  lambda_shape_aligned: 1.0e-3   # sweep variable
  shape_aligned_epsilon: 0.05
  shape_aligned_delta: 0.03
  shape_aligned_n_samples: 3
  dense_depth_dir: /home/ubuntu/Code/Hax-CV/data_haxscanapp/Processed/auth0_69f2515f3b60e77dd927642c/BAH_Leica_Combined/default/B2G/2026-05-06T19-05-59Z_Scan_004/b2g_processed/generated_files/exports/colmap/raw_fisheye_3cam_exclude_sky_person/depths

hydra:
  sweeper:
    direction: maximize
    n_trials: 12
    params:
      loss.lambda_shape_aligned: choice(1e-4, 5e-4, 1e-3, 5e-3, 1e-2)
