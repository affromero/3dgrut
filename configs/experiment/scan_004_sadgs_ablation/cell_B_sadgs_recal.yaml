# @package _global_
#
# Cell B — Max Planck SAD-GS, recalibrated thresholds.
#
# Mechanism: image-side multi-scale structure tensor → eta = projected
# axis length / wavelength_min → split candidates where eta exceeds
# tau_high in majority of views.
#
# Threshold recalibration (vs paper defaults):
#   tau_high: 1.0 → 2.5
#       Reason: prior tensorboard diagnostic on cell B (default thresholds)
#       showed sadgs_eta_wl_high_fraction mean 0.632 (paper criterion
#       flagged 63% of Gaussians per view at TAU=1.0). p95 of eta_wl is
#       2.21, max 4.79. TAU=2.5 targets top ~5% — actually discriminative.
#   max_split_candidates_per_step: 50000 → 500000
#       Reason: even at TAU=2.5, with 10M Gaussians on Scan_004, candidate
#       count fluctuates around 16k. Raise the cap so SAD-GS-flagged
#       candidates are not clipped to gradient-driven cap.
#
# Densify schedule re-enabled — the FROZEN preset disables it; SAD-GS
# needs splits to actually fire.

defaults:
  - base
  - _self_

experiment_name: cell_B_sadgs_recal_5k

strategy:
  residual_density_control:
    enabled: true
    use_structure_density_weight: true
    sadgs_enabled: true
    sadgs_debug_enabled: true
    sadgs_tau_high: 2.5
    max_split_candidates_per_step: 500000
  densify:
    start_iteration: 500
    end_iteration: 4500
    frequency: 300
