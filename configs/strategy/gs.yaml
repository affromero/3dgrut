method: GSStrategy

print_stats: true

densify:
  params: positions # one of [positions, positions_gradient_norm, features_albedo]
  frequency: 300 # densification_interval in 3DGS with default value 100
  start_iteration: 500 # densify_from_iter in 3DGS default value 500
  end_iteration: 15000 # densify_until_iter in 3DGS default value 15_000
  clone_grad_threshold: 0.0002 # Called densify_grad_threshold in 3DGS with default value 0.0002
  split_grad_threshold: 0.0002 # Called densify_grad_threshold in 3DGS with default value 0.0002
  relative_size_threshold: 0.01 # Gaussians larger than relative_size_threshold * scene_extent will be split not cloned. Called percent_dense in 3DGS with default value 0.01
  split:
    n_gaussians: 2 # Hardcoded to 2 in 3DGS

footprint_control:
  enabled: false
  min_radius_px: 0.75
  max_radius_px: 8.0
  subpixel_grad_boost: 3.0
  oversized_grad_boost: 3.0
  log_frequency: 100

footprint_scale_control:
  enabled: false
  frequency: 100
  start_iteration: 100
  end_iteration: 3000
  min_radius_px: 0.5
  max_radius_px: 12.0
  grow_subpixel: true
  max_update_factor: 1.1
  opacity_balance_enabled: false
  opacity_balance_power: 2.0
  opacity_balance_apply_to_shrink: false
  opacity_balance_min_density: 0.0001
  opacity_balance_max_density: 0.999
  log_frequency: 100

residual_density_control:
  enabled: false
  area_source: projected_extent
  tile_area_px: 256.0
  max_area_px: 65536.0
  use_visibility: true
  use_masked_residual: true
  residual_reference: 0.05
  residual_power: 0.5
  residual_min_weight: 0.5
  residual_max_weight: 2.0
  area_reference_px: 4.0
  area_power: 0.5
  area_min_weight: 0.25
  area_max_weight: 4.0
  color_grad_weight: 0.5
  density_grad_weight: 0.25
  gradient_max_weight: 3.0
  use_abs_gradient_score: false
  abs_gradient_collision_reference: 1.0
  abs_gradient_collision_power: 0.5
  abs_gradient_collision_min_weight: 1.0
  abs_gradient_collision_max_weight: 3.0
  use_edge_error_weight: false
  edge_error_reference: 0.05
  edge_error_power: 0.5
  edge_error_min_weight: 0.5
  edge_error_max_weight: 3.0
  use_frequency_error_weight: false
  frequency_error_reference: 0.03
  frequency_error_power: 0.5
  frequency_error_min_weight: 0.5
  frequency_error_max_weight: 4.0
  frequency_use_edge_gate: true
  frequency_edge_reference: 0.05
  frequency_edge_power: 0.5
  frequency_edge_min_weight: 0.75
  frequency_edge_max_weight: 2.0
  # RoMa-guided density control (Phase 3a): per-image precision lookup
  # Hydra struct mode rejects unknown keys, so all defaults must be
  # declared here even when the feature is off (use_roma_precision_weight=false).
  use_roma_precision_weight: false
  roma_precision_dir: ""
  roma_precision_reference: 0.5
  roma_precision_power: 1.0
  roma_precision_min_weight: 0.5
  roma_precision_max_weight: 3.0
  use_support_mask_weight: false
  support_mask_manifest_path: ""
  support_mask_reference: 0.5
  support_mask_power: 1.0
  support_mask_min_weight: 0.05
  support_mask_max_weight: 5.0
  support_mask_invalid_weight: 0.05
  use_support_mask_item_weight: false
  support_mask_item_weight_reference: 1.0
  support_mask_item_weight_power: 1.0
  support_mask_item_weight_min_weight: 0.25
  support_mask_item_weight_max_weight: 3.0
  use_structure_density_weight: false
  structure_score_only: false
  structure_anisotropic_split: false
  structure_project_local_axes: false
  structure_score_reference: 50.0
  structure_score_power: 0.5
  structure_min_weight: 0.5
  structure_max_weight: 4.0
  structure_axis_max_score: 10.0
  structure_split_axis_scale_divisor: 1.5
  structure_rim_radius_fraction: 0.80
  structure_log_frequency: 100
  # SAD-GS-faithful production path. When enabled, GSStrategy replaces the
  # in-house edge/laplacian heuristics with SAD-GS's multi-channel multi-
  # scale structure tensor + wavelength_min (Phase 1), 3-axis projected
  # axis-length / wavelength_min eta scoring (Phase 2), multi-view
  # consistency aggregation with TAU_HIGH=1.0 / TAU_LOW=0.1 thresholds
  # (Phase 3), and anisotropic split with n_k = ceil(sqrt(eta_k))
  # children per axis on a regular grid (Phase 4). See SAD-GS arxiv
  # 2604.28016. Off by default; turn on once cross-validated against
  # the legacy in-house heuristic via sadgs_debug_enabled.
  sadgs_enabled: false
  # SAD-GS multi-view consistency thresholds. A Gaussian is classified
  # high-frequency-violating (split candidate) if its max-axis eta in a
  # given view exceeds sadgs_tau_high. It is classified background/smooth
  # (prune candidate when paired with low opacity) if its max-axis eta
  # stays below sadgs_tau_low. Defaults match SAD-GS arxiv 2604.28016.
  sadgs_tau_high: 1.0
  sadgs_tau_low: 0.1
  # SAD-GS split fraction threshold: Gaussians whose high-eta-view ratio
  # (sadgs_eta_high_count / sadgs_accum_view_count) exceeds this fraction
  # are flagged as split candidates and their gradient score is lifted to
  # 2 * split_grad_threshold, routing them into the existing split path.
  sadgs_tau_split: 0.8
  # SAD-GS-faithful parallel debug path. When enabled, GSStrategy computes
  # SAD-GS multi-channel multi-scale structure tensor + per-Gaussian eta
  # scores alongside the in-house edge/laplacian path. Stats appear in
  # tensorboard under diagnostics/structure_density/sadgs_*. No production
  # behaviour is altered; this is for cross-validation only.
  sadgs_debug_enabled: false
  sadgs_st_levels: 3
  sadgs_base_sigma: 1.0
  sadgs_octave_step: 1.5
  min_total_weight: 0.25
  max_total_weight: 6.0
  max_candidate_fraction: 0.001
  max_clone_candidates_per_step: 50000
  max_split_candidates_per_step: 50000
  clone_scale_multiplier: 1.0
  clone_density_multiplier: 1.0
  clone_min_scale: 0.0
  use_camera_balance: false
  camera_balance_ema_decay: 0.95
  camera_balance_power: 1.0
  camera_balance_min_weight: 0.75
  camera_balance_max_weight: 2.0
  use_camera_radial_weight: false
  camera_radial_target_index: -1
  camera_radial_other_weight: 0.10
  camera_radial_center_fraction: 0.45
  camera_radial_mid_fraction: 0.70
  camera_radial_outer_fraction: 0.90
  camera_radial_center_weight: 0.20
  camera_radial_mid_weight: 0.50
  camera_radial_outer_weight: 1.25
  camera_radial_rim_weight: 2.0
  camera_radial_invalid_weight: 0.05
  log_frequency: 100

# They use the same values for pruning and densification so check the above values
prune:
  frequency: 100
  start_iteration: 500
  end_iteration: 15000
  density_threshold: 0.005 # All Gaussians with the density lower than this will be pruned away


# Start and end iteration are not used in 3DGS
reset_density:
  frequency: 3000 # Opacity reset interval in 3DGS default value 3000
  start_iteration: 0
  end_iteration: ${strategy.densify.end_iteration}
  # This parameter is hardcoded in the 3DGS to 0.01
  new_max_density: 0.01 # The density of the all the Gaussians will be set to min(density, this)

density_decay:
  gamma: 0.99
  start_iteration: -1 # 500
  end_iteration: -1 # 15000
  frequency: 50

prune_weight:
  frequency: 100
  start_iteration: -1
  end_iteration: -1
  weight_threshold: 0.5

prune_scale:
  frequency: 100
  start_iteration: -1
  end_iteration: -1
  threshold: 1.0
