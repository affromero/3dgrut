method: GSStrategy

print_stats: true

densify:
  params: positions # one of [positions, positions_gradient_norm, features_albedo]
  frequency: 300 # densification_interval in 3DGS with default value 100
  start_iteration: 500 # densify_from_iter in 3DGS default value 500
  end_iteration: 15000 # densify_until_iter in 3DGS default value 15_000
  clone_grad_threshold: 0.0002 # Called densify_grad_threshold in 3DGS with default value 0.0002
  split_grad_threshold: 0.0002 # Called densify_grad_threshold in 3DGS with default value 0.0002
  relative_size_threshold: 0.01 # Gaussians larger than relative_size_threshold * scene_extent will be split not cloned. Called percent_dense in 3DGS with default value 0.01
  split:
    n_gaussians: 2 # Hardcoded to 2 in 3DGS
  # Route otherwise-cloned Gaussians with a large on-screen 3DGUT support
  # box through the existing split operation. max_px is the largest axis of
  # the renderer's tight, opacity-bounded half-extent after covariance
  # dilation and Mip opacity scaling. It is not an eigen-radius or an scale-shape
  # native status value. Default disabled preserves the upstream decisions.
  projected_extent_split:
    enabled: false
    max_px: 8.0
  # Reroute a strict subset of otherwise-cloned Gaussians through the existing
  # split operation only when the SAME camera observations have both a large
  # covariance eigen-radius and positional gradient demand. The renderer
  # exposes its existing inverse-covariance conic packet for this diagnostic;
  # RGB and compositing are unchanged. The reroute ceiling is a fail-closed
  # experiment guard, not a truncation policy.
  covariance_gradient_split:
    enabled: false
    radius_px: 8.0
    min_large_observations: 6
    max_reroute_fraction: 0.22385751031338305
    # Fail at the next densification boundary when invalid on-screen conic
    # packets exceed 10 ppm in that accumulation window. Invalid packets are
    # excluded from G+ and N+ but remain in the existing total denominator N.
    max_invalid_fraction: 0.00001
  # Isolated visibility-and-shape-derived topology arm for ordinary 3DGUT/Adam. Existing
  # split eligibility remains unchanged. Among those candidates only rows with
  # at least 32 per-iteration renderer visibility observations in the current
  # densification window, strict physical anisotropy > 8, and largest scale
  # > 0.01 world units use the deterministic largest-axis split. Repeated
  # sampling of one image contributes repeated observations; this is not a
  # distinct-frame count. Two child opacities preserve the parent's base-alpha
  # algebra; displaced, rescaled kernels do not preserve arbitrary-ray
  # transmittance. Default disabled preserves upstream topology.
  scale_shape_split:
    enabled: false
    anisotropy_threshold: 8.0
    min_largest_scale: 0.01
    min_observations: 32
  # Field-angle-aware (solid-angle-weighted) densification. Screen-space
  # density control is blind to the fisheye projection Jacobian, so the
  # periphery (few pixels per steradian) is under-densified -> oversized,
  # over-smoothing rim Gaussians. When enabled, the per-Gaussian
  # grad-threshold is scaled DOWN and the split/clone size-cap is scaled
  # DOWN at high field angle theta (the gradient-weighted mean theta the
  # Gaussian was observed at), so the rim gets MORE, SMALLER Gaussians.
  # Default disabled -> byte-identical to upstream behaviour.
  theta_aware:
    enabled: false
    theta_power: 1.5 # thresh(theta) = base * cos(theta)^theta_power
    size_cap_power: 1.0 # size_cap(theta) = base_cap * cos(theta)^size_cap_power
    min_cos: 0.1 # floor on cos(theta) so the rim threshold/cap cannot collapse to 0
  # Feature-gradient-aware densification. Position gradients drive vanilla
  # 3DGS densification, but high-frequency color residuals in SIREN/Gabor
  # carrier runs backpropagate strongly through features_specular. When
  # enabled, the accumulated positional densification score is multiplied by
  # a bounded boost derived from the per-Gaussian features_specular gradient.
  # Default disabled -> upstream/theta-aware behavior is unchanged.
  feature_grad:
    enabled: false
    power: 0.5
    quantile: 0.95
    max_boost: 4.0
    carrier_tail_only: false

# They use the same values for pruning and densification so check the above values
prune:
  frequency: 100
  start_iteration: 500
  end_iteration: 15000
  density_threshold: 0.005 # All Gaussians with the density lower than this will be pruned away


# Start and end iteration are not used in 3DGS
reset_density:
  frequency: 3000 # Opacity reset interval in 3DGS default value 3000
  start_iteration: 0
  end_iteration: ${strategy.densify.end_iteration}
  # This parameter is hardcoded in the 3DGS to 0.01
  new_max_density: 0.01 # The density of the all the Gaussians will be set to min(density, this)

density_decay:
  gamma: 0.99
  start_iteration: -1 # 500
  end_iteration: -1 # 15000
  frequency: 50

prune_weight:
  frequency: 100
  start_iteration: -1
  end_iteration: -1
  weight_threshold: 0.5

prune_scale:
  frequency: 100
  start_iteration: -1
  end_iteration: -1
  threshold: 1.0

# Non-finite / runaway-scale particle guard. A single Gaussian with a
# non-finite position/rotation/scale/density, or a scale far beyond the
# scene, yields a degenerate proxy AABB; OptiX traversal against such a
# BVH can spin forever, freezing training at 100% GPU with no error.
# When enabled, every optimizer step neutralizes non-finite particles in
# place (origin, identity rotation, tiny scale), clamps scales above
# max_world_size, and zeroes the affected optimizer-state rows so a
# poisoned Adam moment cannot regrow the defect. A warning names the
# count whenever anything is sanitized.
# Default disabled -> byte-identical to upstream behaviour.
scale_guard:
  enabled: false
  max_world_size: 10.0
